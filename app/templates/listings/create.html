{% extends 'base.html' %}
{% block title %}Новое объявление{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <h2 class="fw-bold mb-4">Новое объявление</h2>
        <div class="auth-card p-4 p-md-5">
            <form method="post" enctype="multipart/form-data">
                <div class="row g-4">
                    <div class="col-12">
                        <label class="form-label fw-semibold">Название <span class="text-danger">*</span></label>
                        <input type="text" name="title" class="form-control" required maxlength="200"
                               placeholder="Например: Гайд по заработку на арбитраже">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Тип <span class="text-danger">*</span></label>
                        <select name="listing_type" class="form-select" required>
                            <option value="service">Услуга</option>
                            <option value="guide">Гайд</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Категория <span class="text-danger">*</span></label>
                        <select name="category" class="form-select" required>
                            {% for slug, label in categories %}
                            <option value="{{ slug }}">{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Цена (₽) <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <input type="number" name="price" class="form-control" required
                                   min="1" step="1" placeholder="500">
                            <span class="input-group-text">₽</span>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Срок выполнения</label>
                        <input type="text" name="delivery_time" class="form-control"
                               placeholder="Например: 1-3 дня">
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-semibold">Описание <span class="text-danger">*</span></label>
                        <textarea name="description" class="form-control" rows="8" required
                                  placeholder="Подробно опиши что именно ты предлагаешь, результат, условия..."></textarea>
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-semibold">Изображение</label>
                        <input type="file" name="image" class="form-control" accept="image/*">
                        <div class="form-text text-muted">PNG, JPG, WEBP до 8 МБ</div>
                    </div>
                </div>
                <div class="d-flex gap-3 mt-4">
                    <button type="submit" class="btn btn-violet px-5">
                        <i class="bi bi-check-lg me-2"></i>Опубликовать
                    </button>
                    <a href="{{ url_for('main.dashboard') }}" class="btn btn-outline-secondary">Отмена</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
