{% extends 'base.html' %}
{% block title %}Редактировать{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <h2 class="fw-bold mb-4">Редактировать объявление</h2>
        <div class="auth-card p-4 p-md-5">
            <form method="post" enctype="multipart/form-data">
                <div class="row g-4">
                    <div class="col-12">
                        <label class="form-label fw-semibold">Название</label>
                        <input type="text" name="title" class="form-control"
                               value="{{ listing.title }}" required maxlength="200">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Тип</label>
                        <select name="listing_type" class="form-select">
                            <option value="service" {{ 'selected' if listing.listing_type == 'service' }}>Услуга</option>
                            <option value="guide" {{ 'selected' if listing.listing_type == 'guide' }}>Гайд</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Категория</label>
                        <select name="category" class="form-select">
                            {% for slug, label in categories %}
                            <option value="{{ slug }}" {{ 'selected' if listing.category == slug }}>{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Цена (₽)</label>
                        <div class="input-group">
                            <input type="number" name="price" class="form-control"
                                   value="{{ listing.price | int }}" required min="1" step="1">
                            <span class="input-group-text">₽</span>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Срок выполнения</label>
                        <input type="text" name="delivery_time" class="form-control"
                               value="{{ listing.delivery_time }}">
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-semibold">Описание</label>
                        <textarea name="description" class="form-control" rows="8" required>{{ listing.description }}</textarea>
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-semibold">Новое изображение</label>
                        {% if listing.image %}
                        <div class="mb-2">
                            <img src="{{ url_for('static', filename=listing.image) }}"
                                 height="100" class="rounded-2">
                        </div>
                        {% endif %}
                        <input type="file" name="image" class="form-control" accept="image/*">
                    </div>
                    <div class="col-12">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" name="is_active" id="is_active"
                                   {{ 'checked' if listing.is_active }}>
                            <label class="form-check-label" for="is_active">Объявление активно</label>
                        </div>
                    </div>
                </div>
                <div class="d-flex gap-3 mt-4">
                    <button type="submit" class="btn btn-violet px-5">
                        <i class="bi bi-check-lg me-2"></i>Сохранить
                    </button>
                    <a href="{{ url_for('listings.detail', listing_id=listing.id) }}"
                       class="btn btn-outline-secondary">Отмена</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
