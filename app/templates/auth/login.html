{% extends 'base.html' %}
{% block title %}Вход{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="auth-card p-4 p-md-5">
            <h2 class="fw-bold mb-1 text-center">Вход</h2>
            <p class="text-muted text-center mb-4">Войди в свой аккаунт</p>

            <form method="post">
                <div class="mb-3">
                    <label class="form-label">Логин или Email</label>
                    <input type="text" name="login" class="form-control" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label">Пароль</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <div class="mb-4 form-check">
                    <input type="checkbox" class="form-check-input" id="remember" name="remember">
                    <label class="form-check-label" for="remember">Запомнить меня</label>
                </div>
                <button type="submit" class="btn btn-violet w-100 py-2">Войти</button>
            </form>

            <hr class="my-4 border-secondary">
            <p class="text-center text-muted mb-0">
                Нет аккаунта?
                <a href="{{ url_for('auth.register') }}" class="link-violet">Зарегистрироваться</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
