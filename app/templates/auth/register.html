{% extends 'base.html' %}
{% block title %}Регистрация{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="auth-card p-4 p-md-5">
            <h2 class="fw-bold mb-1 text-center">Регистрация</h2>
            <p class="text-muted text-center mb-4">Создай аккаунт бесплатно</p>

            <form method="post">
                <div class="mb-3">
                    <label class="form-label">Имя пользователя</label>
                    <input type="text" name="username" class="form-control" required autofocus
                           minlength="3" maxlength="80">
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Пароль</label>
                    <input type="password" name="password" class="form-control" required minlength="6">
                </div>
                <div class="mb-4">
                    <label class="form-label">Подтвердить пароль</label>
                    <input type="password" name="confirm_password" class="form-control" required>
                </div>

                <div class="mb-4">
                    <label class="form-label">Я хочу...</label>
                    <div class="role-select-grid">
                        <label class="role-option">
                            <input type="radio" name="role" value="buyer" checked>
                            <div class="role-card">
                                <div class="fw-semibold">Покупать</div>
                                <div class="text-muted small">Искать и покупать услуги и гайды</div>
                            </div>
                        </label>
                        <label class="role-option">
                            <input type="radio" name="role" value="seller">
                            <div class="role-card">
                                <div class="fw-semibold">Продавать</div>
                                <div class="text-muted small">Размещать объявления и зарабатывать</div>
                            </div>
                        </label>
                    </div>
                </div>

                <button type="submit" class="btn btn-violet w-100 py-2">Создать аккаунт</button>
            </form>

            <hr class="my-4 border-secondary">
            <p class="text-center text-muted mb-0">
                Уже есть аккаунт?
                <a href="{{ url_for('auth.login') }}" class="link-violet">Войти</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
