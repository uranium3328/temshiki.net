{% extends 'base.html' %}
{% block title %}Забыл пароль{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="auth-card p-4 p-md-5">
            <h2 class="fw-bold mb-1 text-center">Забыл пароль</h2>
            <p class="text-muted text-center mb-4">
                Введи email от своего аккаунта — пришлём ссылку для сброса.
            </p>

            <form method="post">
                <div class="mb-4">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control"
                           placeholder="example@mail.ru" required autofocus>
                </div>
                <button type="submit" class="btn btn-violet w-100 py-2">
                    Отправить ссылку
                </button>
            </form>

            <hr class="my-4 border-secondary">
            <p class="text-center text-muted mb-0">
                Вспомнил пароль?
                <a href="{{ url_for('auth.login') }}" class="link-violet">Войти</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
