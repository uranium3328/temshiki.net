{% extends 'base.html' %}
{% block title %}Новый пароль{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="auth-card p-4 p-md-5">
            <h2 class="fw-bold mb-1 text-center">Новый пароль</h2>
            <p class="text-muted text-center mb-4">Придумай новый пароль для входа.</p>

            <form method="post">
                <div class="mb-3">
                    <label class="form-label">Новый пароль</label>
                    <input type="password" name="password" class="form-control"
                           placeholder="Минимум 6 символов" required autofocus>
                </div>
                <div class="mb-4">
                    <label class="form-label">Повтори пароль</label>
                    <input type="password" name="confirm_password" class="form-control"
                           placeholder="Ещё раз" required>
                </div>
                <button type="submit" class="btn btn-violet w-100 py-2">
                    Сохранить пароль
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
